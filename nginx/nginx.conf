server {
    server_name labbee.beanalytic.com;

    # Frontend static build served by Nginx
    root /root/Lab_Bee_React/frontend/build;
    index index.html;

    # React Router SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Backend REST API
    location /api/ {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO websocket upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/labbee.beanalytic.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/labbee.beanalytic.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = labbee.beanalytic.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name labbee.beanalytic.com;
    return 404;
}
